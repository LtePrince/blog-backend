name: Deploy Go Backend (Production)

on:
  push:
    branches: [main] # 仅在 main 分支推送时触发

env:
  APP_NAME: blog-backend
  DEPLOY_DIR: /www/wwwroot/blog-backend
  GO_VERSION: "1.23"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Generate Timestamp
        id: vars
        run: echo "TS=$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT

      - name: Build Binary
        run: |
          mkdir -p ./dist/configs
          # 交叉编译 Linux 64位版本
          GOOS=linux GOARCH=amd64 go build -o ./dist/server main.go

      - name: Prepare Package
        run: |
          # 拷贝生产环境配置文件并重命名
          if [ -f "configs/config_prod.yaml" ]; then
            cp configs/config_prod.yaml ./dist/configs/config.yaml
          else
            echo "❌ Error: configs/config_prod.yaml not found!"
            exit 1
          fi
          cd dist && tar -czf ../release.tar.gz .

      - name: Prepare Remote Dir
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: mkdir -p ${{ env.DEPLOY_DIR }}/releases/${{ steps.vars.outputs.TS }}

      - name: Upload to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "release.tar.gz"
          target: "${{ env.DEPLOY_DIR }}/releases/${{ steps.vars.outputs.TS }}"

      - name: Remote Deploy
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: APP_NAME
          script: |
            set -euo pipefail
            DEPLOY_DIR="${{ env.DEPLOY_DIR }}"
            RELEASE_TS="${{ steps.vars.outputs.TS }}"
            RELEASE_PATH="$DEPLOY_DIR/releases/$RELEASE_TS"
            FINAL_APP_NAME="$APP_NAME-prod"

            # 1. 解压并清理压缩包
            cd "$RELEASE_PATH"
            tar -xzf release.tar.gz && rm release.tar.gz
            chmod +x server

            # 2. 原子切换软链接
            ln -sfn "$RELEASE_PATH" "$DEPLOY_DIR/current"

            # 3. PM2 启动/重启
            cd "$DEPLOY_DIR/current"
            if pm2 describe "$FINAL_APP_NAME" > /dev/null; then
              echo "✅ 正在平滑重启生产环境进程..."
              pm2 reload "$FINAL_APP_NAME"
            else
              echo "🚀 正在启动生产环境进程..."
              pm2 start ./server \
                --name "$FINAL_APP_NAME" \
                --cwd "$DEPLOY_DIR/current" \
                -- \
                serve --config ./configs/config.yaml
            fi
            pm2 save

            # 4. 自动清理旧版本 (保留最新的 5 个版本)
            echo "🧹 正在清理旧版本..."
            cd "$DEPLOY_DIR/releases"
            # 列出所有目录，按时间排序，删除 5 个以后的所有目录
            ls -dt */ | tail -n +6 | xargs -I {} rm -rf "{}"
            
            echo "🎉 部署成功！当前版本: $RELEASE_TS"